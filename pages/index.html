<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Cloud Public Price Sheets</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,sans-serif;
    background:#f0f2f5; color:#1a1a2e; line-height:1.6;
  }
  header {
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    color:#fff; padding:2.5rem 1rem; text-align:center;
  }
  header h1 { font-size:1.8rem; font-weight:600; }
  header p { font-size:0.95rem; opacity:0.8; margin-top:0.3rem; }
  .badge { display:inline-block; margin-top:0.8rem; padding:0.3rem 0.9rem;
    border-radius:999px; font-size:0.8rem; background:rgba(255,255,255,0.15); }
  .badge.g { background:#2ea44f; }
  .container { max-width:720px; margin:0 auto; padding:2rem 1rem; }
  .card {
    background:#fff; border-radius:10px; box-shadow:0 1px 4px rgba(0,0,0,0.08);
    padding:2rem; text-align:center;
  }
  .card h2 { font-size:1.3rem; font-weight:600; margin-bottom:0.5rem; }
  .card p  { color:#666; margin-bottom:1.5rem; }
  .meta { font-size:0.85rem; color:#888; margin-bottom:1.5rem; }
  .btn {
    display:inline-flex; align-items:center; gap:0.5rem;
    padding:0.85rem 2rem; background:#2ea44f; color:#fff;
    border-radius:8px; font-size:1.1rem; font-weight:600;
    text-decoration:none; transition:background 0.15s;
  }
  .btn:hover { background:#2c974b; }
  hr { margin:2rem 0; border:none; border-top:1px solid #e8eaed; }
  .links { font-size:0.9rem; }
  .links a { color:#0366d6; text-decoration:none; }
  .links a:hover { text-decoration:underline; }
  footer { text-align:center; padding:2rem 1rem; color:#888; font-size:0.85rem; }
  footer a { color:#0366d6; }
</style>
</head>
<body>

<header>
  <h1>📊 T-Cloud Public Price Sheets</h1>
  <p>Weekly pricing data from the T Cloud Public Price Calculator API</p>
  <span class="badge g">▼ Latest: <span id="date">—</span></span>
</header>

<div class="container">
  <div class="card">
    <h2>⬇ Ready to download</h2>
    <p>The latest pricing workbook is ready for use in Excel.</p>
    <p class="meta">File size: <span id="size">—</span></p>
    <a class="btn" id="dl" href="#">Download XLSX</a>
  </div>

  <div class="links">
    <p>Generated by <a href="https://github.com/aliuly/xlpricer">xlpricer</a>
    &middot;
    <a href="https://github.com/aliuly/xlpricer/actions?query=workflow%3A%22Weekly+Price+Sheet%22">Build logs</a>
    &middot;
    <a href="https://docs.otc.t-systems.com/price-calculator/api-ref/">API docs</a></p>
  </div>
</div>

<footer>
  <a href="https://github.com/aliuly/xlpricer">aliuly/xlpricer</a>
</footer>

<script>
fetch('builds.json').then(r=>r.json()).then(b => {
  document.getElementById('date').textContent = b.date;
  document.getElementById('size').textContent =
    (b.size >= 1e6 ? (b.size/1e6).toFixed(1)+' MB' : (b.size/1e3).toFixed(1)+' KB');
  document.getElementById('dl').href = b.file;
});
</script>
</body>
</html>
